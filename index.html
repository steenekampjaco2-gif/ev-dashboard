<!DOCTYPE html>
<html>
<head>
  <title>EV Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      display: flex;
      background: #f8fafc;
    }

    .sidebar {
      width: 240px;
      background: #0f172a;
      color: white;
      padding: 20px;
      height: 100vh;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ EV Dashboard</h2>
</div>

<div class="main">
  <div class="card">
    <h2 id="kwh">-</h2>
    <p>Total kWh</p>
  </div>

  <canvas id="chart"></canvas>
</div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSCxLU4H3ZDZZ0Nuh69Yby6JteAWPUdhXM3CpqCEROHv_TtTyPhX5i2w22VzcdnK0ssaGdJBJrHw4Y8/pub?output=csv";

Papa.parse(sheetURL, {
  download: true,
  header: true,
  complete: function(results) {

    const data = results.data;

    let totalKwh = 0;
    let labels = [];
    let values = [];

    const num = v => parseFloat((v || "").replace(/[£,]/g, "")) || 0;

    data.forEach(row => {
      const kwh = num(row["AC kWh"]) + num(row["DC kWh"]);

      if (kwh > 0) {
        totalKwh += kwh;
        labels.push(row["Timestamp"]);
        values.push(kwh);
      }
    });

    document.getElementById("kwh").innerText = totalKwh.toFixed(1);

    new Chart(document.getElementById("chart"), {
      type: "line",
      data: {
        labels: labels,
        datasets: [{
          label: "kWh",
          data: values
        }]
      }
    });
  }
});
</script>

</body>
</html>
