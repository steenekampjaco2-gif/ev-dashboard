<!DOCTYPE html>
<html>
<head>
  <title>EV Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      display: flex;
      background: #f8fafc;
    }

    .sidebar {
      width: 240px;
      background: #0f172a;
      color: white;
      padding: 20px;
      height: 100vh;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 28px;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ EV Dashboard</h2>
</div>

<div class="main">
  <div class="card">
    Total kWh: <span id="kwh">-</span>
  </div>

  <canvas id="chart"></canvas>
</div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSCxLU4H3ZDZZ0Nuh69Yby6JteAWPUdhXM3CpqCEROHv_TtTyPhX5i2w22VzcdnK0ssaGdJBJrHw4Y8/pub?output=csv";

Papa.parse(sheetURL, {
  download: true,
  header: true,
  complete: function(results) {

    const data = results.data;

    console.log("DATA SAMPLE:", data[0]); // debug

    const num = v => parseFloat((v || "").replace(/[£,]/g, "")) || 0;

    let totalKwh = 0;
    let labels = [];
    let values = [];

    data.forEach(row => {

      // Try ALL possible column names automatically
      let ac = 0;
      let dc = 0;

      for (let key in row) {
        const lower = key.toLowerCase();

        if (lower.includes("ac") && lower.includes("kwh")) {
          ac = num(row[key]);
        }

        if (lower.includes("dc") && lower.includes("kwh")) {
          dc = num(row[key]);
        }
      }

      const kwh = ac + dc;

      if (kwh > 0) {
        totalKwh += kwh;

        // Find a date column automatically
        let date = "";
        for (let key in row) {
          if (key.toLowerCase().includes("date") || key.toLowerCase().includes("time")) {
            date = row[key];
            break;
          }
        }

        labels.push(date || "entry");
        values.push(kwh);
      }
    });

    document.getElementById("kwh").innerText = totalKwh.toFixed(1);

    new Chart(document.getElementById("chart"), {
      type: "line",
      data: {
        labels: labels,
        datasets: [{
          label: "kWh per session",
          data: values,
          tension: 0.3
        }]
      }
    });
  }
});
</script>

</body>
</html>
